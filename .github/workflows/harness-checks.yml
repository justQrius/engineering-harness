name: Harness Checks

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.10"
          cache: false

      - name: Install task
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Run harness checks
        run: task check:harness

  project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.10"
          cache: false

      - name: Set up Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Node dependencies
        if: hashFiles('package.json') != ''
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install task
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Run project checks
        run: task check:project